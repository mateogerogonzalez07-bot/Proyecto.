    <main >
     <form class="formulario">

  <!-- Nombre -->
  <div class="campo">
    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" name="nombre" placeholder="Nombre">
  </div>

  <!-- Apellido -->
  <div class="campo">
    <label for="apellido">Apellido</label>
    <input type="text" id="apellido" name="apellido" placeholder="Apellido">
  </div>

  <!-- Email -->
  <div class="campo">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="email">
  </div>

  <!-- Edad -->
  <div class="campo">
    <label for="edad">Edad</label>
    <input type="number" id="edad" name="edad" min="1" max="100" placeholder="Edad">
  </div>

  <!-- Tipo de servicio (radio) -->
  <div class="campo">
    <label>Servicio</label>
    <div>
      <input type="radio" id="pintura" name="servicio" value="pintura"  placeholder="Pintura">
      <label for="pintura">Pintura</label>

      <input type="radio" id="electricidad" name="servicio" value="electricidad" placeholder="Electricidad">
      <label for="electricidad">Electricidad</label>

      <input type="radio" id="Construccion" name="servicio" value="Construccion" placeholder="Construccion">
      <label for="Construccion">Construccion</label>

      <input type="radio" id="Plomeria" name="servicio" value="Plomeria"  placeholder="Plomeria">
      <label for="Plomeria">Plomeria</label>

      <input type="radio" id="Singueria" name="servicio" value="Singueria" placeholder="Singueria">
      <label for="Singueria">Singueria</label>

    </div>
  </div>

  <!-- Mensaje -->
  <div class="campo">
    <label for="mensaje">Mensaje</label>
    <textarea id="mensaje" name="mensaje" rows="4" placeholder="Mensaje"></textarea>
  </div>

  <!-- Botones -->
  <div class="botones">
    <button type="reset" class="reset">Resetear</button>
    <button type="submit" class="enviar">Enviar</button>
  </div>

</form>
